<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DollarPay Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-dollar-green { background-color: #228B22; }
        .text-dollar-green { color: #228B22; }
        .border-dollar-green { border-color: #228B22; }
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen pb-20 bg-white">

    <header class="p-6 flex justify-between items-center bg-white">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-dollar-green rounded-full flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-dollar-sign text-white text-xl"></i>
            </div>
            <h1 class="font-bold text-xl text-gray-800">DollarPay</h1>
        </div>
        <button onclick="showKey()" class="text-gray-400 hover:text-red-500">
            <i class="fa-solid fa-gear text-2xl"></i>
        </button>
    </header>

    <main class="px-6">
        <div class="bg-dollar-green rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
            
            <p class="text-sm opacity-80 mb-1">Total Saldo USDT (Polygon)</p>
            <h2 id="balanceText" class="text-4xl font-bold mb-2">$ 0.00</h2>
            <p id="walletAddress" onclick="copyAddress()" class="text-[10px] opacity-60 break-all cursor-pointer bg-black bg-opacity-20 p-2 rounded-lg hover:bg-opacity-30 transition-all"></p>
            
            <div class="flex gap-4 mt-6">
                <button onclick="openTransak('BUY')" class="flex-1 bg-white text-dollar-green font-bold py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-gray-100 transition-all">
                    <i class="fa-solid fa-plus-circle"></i> Top Up
                </button>
                <button onclick="openTransak('SELL')" class="flex-1 bg-green-900 bg-opacity-30 border border-white border-opacity-30 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-opacity-40 transition-all">
                    <i class="fa-solid fa-wallet"></i> Withdraw
                </button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mt-8">
            <div class="flex flex-col items-center gap-2">
                <button onclick="copyAddress()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green hover:shadow-md">
                    <i class="fa-solid fa-qrcode"></i>
                </button>
                <span class="text-xs text-gray-500">QR Code</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button onclick="refreshBalance()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green hover:shadow-md">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <span class="text-xs text-gray-500">Refresh</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green opacity-50">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
                <span class="text-xs text-gray-500">History</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button onclick="showKey()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green hover:shadow-md">
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
                <span class="text-xs text-gray-500">Security</span>
            </div>
        </div>

        <div class="mt-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-800">Aktivitas Terakhir</h3>
                <a href="#" class="text-dollar-green text-sm font-semibold">Lihat Semua</a>
            </div>
            <div id="activityList" class="space-y-4">
                <p class="text-center text-xs text-gray-400">Belum ada transaksi real-time.</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around py-3">
        <button class="text-dollar-green">
            <i class="fa-solid fa-wallet text-xl"></i>
            <p class="text-[10px] mt-1 font-bold">Dompet</p>
        </button>
        <button class="text-gray-400 hover:text-dollar-green">
            <i class="fa-solid fa-chart-line text-xl"></i>
            <p class="text-[10px] mt-1">Market</p>
        </button>
        <button class="text-gray-400 hover:text-dollar-green">
            <i class="fa-solid fa-user text-xl"></i>
            <p class="text-[10px] mt-1">Profil</p>
        </button>
    </nav>

    <script>
        // --- KONFIGURASI ---
        const ALCHEMY_URL = "https://polygon-mainnet.g.alchemy.com/v2/EESu3FuMWWr61K6o6G5cy"; 
        const USDT_CONTRACT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        const TRANSAK_API_KEY = "4f17845f-4d22-446a-86a0-54e7d70422f2"; // Staging Key

        let wallet;
        const provider = new ethers.JsonRpcProvider(ALCHEMY_URL);

        // --- FUNGSI CORE ---
        function initWallet() {
            let savedKey = localStorage.getItem('dollarpay_private_key');
            if (savedKey) {
                wallet = new ethers.Wallet(savedKey, provider);
            } else {
                const newWallet = ethers.Wallet.createRandom();
                localStorage.setItem('dollarpay_private_key', newWallet.privateKey);
                wallet = new ethers.Wallet(newWallet.privateKey, provider);
            }
            document.getElementById('walletAddress').innerText = wallet.address;
            refreshBalance();
        }

        async function refreshBalance() {
            const btn = document.getElementById('balanceText');
            btn.innerText = "...";
            try {
                const abi = ["function balanceOf(address) view returns (uint256)"];
                const contract = new ethers.Contract(USDT_CONTRACT, abi, provider);
                const balance = await contract.balanceOf(wallet.address);
                const formatted = ethers.formatUnits(balance, 6);
                btn.innerText = "$ " + parseFloat(formatted).toLocaleString('en-US', {minimumFractionDigits: 2});
            } catch (e) {
                console.error(e);
                btn.innerText = "$ 0.00";
            }
        }

        function openTransak(mode) {
            const baseUrl = "https://staging-global.transak.com"; // Ganti 'staging-global' ke 'global' jika sudah live
            const params = new URLSearchParams({
                apiKey: TRANSAK_API_KEY,
                defaultCryptoCurrency: "USDT",
                cryptoCurrencyList: "USDT",
                network: "polygon",
                fiatCurrency: "IDR",
                walletAddress: wallet.address
            });
            if (mode === 'SELL') params.append("productsAvailed", "SELL");
            
            window.open(`${baseUrl}?${params.toString()}`, '_blank', 'width=450,height=600');
        }

        function copyAddress() {
            navigator.clipboard.writeText(wallet.address);
            alert("Alamat dompet disalin!");
        }

        function showKey() {
            const check = prompt("Ketik 'SHOW' untuk melihat Private Key (Rahasia):");
            if(check === 'SHOW') alert("PRIVATE KEY ANDA:\n" + wallet.privateKey + "\n\nSIMPAN DI KERTAS!");
        }

        // Jalankan saat load
        window.onload = initWallet;
    </script>
</body>
</html>
