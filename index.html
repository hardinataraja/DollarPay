<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DollarPay Wallet</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#228B22">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .bg-dollar-green { background-color: #228B22; }
        .text-dollar-green { color: #228B22; }
        .border-dollar-green { border-color: #228B22; }
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 10px; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen pb-20 bg-white">

    <header class="p-6 flex justify-between items-center bg-white">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-dollar-green rounded-full flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-dollar-sign text-white text-xl"></i>
            </div>
            <h1 class="font-bold text-xl text-gray-800">DollarPay</h1>
        </div>
        <button onclick="showKey()" class="text-gray-400 hover:text-red-500">
            <i class="fa-solid fa-gear text-2xl"></i>
        </button>
    </header>

    <main class="px-6">
        <div class="bg-dollar-green rounded-3xl p-8 text-white shadow-xl relative overflow-hidden mb-6">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full"></div>
            
            <p class="text-sm opacity-80 mb-1">Total Saldo USDT (Polygon)</p>
            <h2 id="balanceText" class="text-4xl font-bold mb-2">$ 0.00</h2>
            <p id="walletAddressDisplay" onclick="copyAddress()" class="text-[10px] opacity-60 break-all cursor-pointer bg-black bg-opacity-20 p-2 rounded-lg hover:bg-opacity-30 transition-all"></p>
            
            <div class="flex gap-4 mt-6">
                <button onclick="openTransak('BUY')" class="flex-1 bg-white text-dollar-green font-bold py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-gray-100 transition-all">
                    <i class="fa-solid fa-plus-circle"></i> Top Up
                </button>
                <button onclick="openTransak('SELL')" class="flex-1 bg-green-900 bg-opacity-30 border border-white border-opacity-30 text-white font-bold py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-opacity-40 transition-all">
                    <i class="fa-solid fa-wallet"></i> Withdraw
                </button>
            </div>
        </div>

        <div id="qrContainer" class="hidden bg-white p-6 rounded-3xl shadow-inner text-center mb-6 border-2 border-dashed border-gray-200">
            <p class="text-sm font-bold text-gray-600 mb-4">Scan untuk kirim USDT</p>
            <div id="qrcode"></div>
            <button onclick="toggleQR()" class="mt-4 text-xs text-red-500 font-bold">Tutup QR</button>
        </div>

        <div class="grid grid-cols-4 gap-4 mt-4">
            <div class="flex flex-col items-center gap-2">
                <button onclick="toggleQR()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green hover:shadow-md transition-all">
                    <i class="fa-solid fa-qrcode"></i>
                </button>
                <span class="text-xs text-gray-500">QR Code</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button onclick="refreshBalance()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green hover:shadow-md">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <span class="text-xs text-gray-500">Refresh</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button onclick="alert('Fitur segera hadir!')" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green opacity-50">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </button>
                <span class="text-xs text-gray-500">History</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <button onclick="showKey()" class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center text-dollar-green hover:shadow-md">
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
                <span class="text-xs text-gray-500">Security</span>
            </div>
        </div>

        <div class="mt-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-800">Aktivitas Terakhir</h3>
                <a href="#" class="text-dollar-green text-sm font-semibold">Lihat Semua</a>
            </div>
            <div id="activityList" class="space-y-4">
                <p class="text-center text-xs text-gray-400">Hubungkan dompet untuk melihat riwayat.</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around py-3">
        <button class="text-dollar-green">
            <i class="fa-solid fa-wallet text-xl"></i>
            <p class="text-[10px] mt-1 font-bold">Dompet</p>
        </button>
        <button class="text-gray-400"><i class="fa-solid fa-chart-line text-xl"></i></button>
        <button class="text-gray-400"><i class="fa-solid fa-user text-xl"></i></button>
    </nav>

    <script>
        const ALCHEMY_URL = "https://polygon-mainnet.g.alchemy.com/v2/EESu3FuMWWr61K6o6G5cy"; 
        const USDT_CONTRACT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        let TRANSAK_API_KEY = "6fd30e1e-df60-4337-b34a-ba47e2b86e6a"; 

        let wallet;
        const provider = new ethers.JsonRpcProvider(ALCHEMY_URL);

        function initWallet() {
            let savedKey = localStorage.getItem('dollarpay_private_key');
            if (savedKey) {
                wallet = new ethers.Wallet(savedKey, provider);
            } else {
                const newWallet = ethers.Wallet.createRandom();
                localStorage.setItem('dollarpay_private_key', newWallet.privateKey);
                wallet = new ethers.Wallet(newWallet.privateKey, provider);
            }
            document.getElementById('walletAddressDisplay').innerText = wallet.address;
            
            // Generate QR Code tersembunyi
            new QRCode(document.getElementById("qrcode"), {
                text: wallet.address,
                width: 180,
                height: 180
            });
            
            refreshBalance();
        }

        async function refreshBalance() {
            const el = document.getElementById('balanceText');
            el.innerText = "...";
            try {
                const abi = ["function balanceOf(address) view returns (uint256)"];
                const contract = new ethers.Contract(USDT_CONTRACT, abi, provider);
                const balance = await contract.balanceOf(wallet.address);
                el.innerText = "$ " + parseFloat(ethers.formatUnits(balance, 6)).toLocaleString('en-US', {minimumFractionDigits: 2});
            } catch (e) {
                el.innerText = "$ 0.00";
            }
        }

        function toggleQR() {
            const container = document.getElementById('qrContainer');
            container.classList.toggle('hidden');
        }

        function openTransak(mode) {
            // Jika masih pakai Staging API Key, gunakan USD agar tidak error 'not supported'
            const fiat = TRANSAK_API_KEY.includes('4f17845f') ? "USD" : "IDR";
            const baseUrl = TRANSAK_API_KEY.includes('4f17845f') ? "https://staging-global.transak.com" : "https://global.transak.com";

            const params = new URLSearchParams({
                apiKey: TRANSAK_API_KEY,
                defaultCryptoCurrency: "USDT",
                network: "polygon",
                fiatCurrency: fiat,
                walletAddress: wallet.address
            });
            if (mode === 'SELL') params.append("productsAvailed", "SELL");
            window.open(`${baseUrl}?${params.toString()}`, '_blank', 'width=450,height=600');
        }

        function copyAddress() {
            navigator.clipboard.writeText(wallet.address);
            alert("Alamat dompet disalin!");
        }

        function showKey() {
            const check = prompt("Ketik 'SHOW' untuk melihat Private Key:");
            if(check === 'SHOW') alert("KUNCI RAHASIA:\n" + wallet.privateKey);
        }

        window.onload = initWallet;

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
